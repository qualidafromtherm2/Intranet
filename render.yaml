# ============================================================
# render.yaml — Configuração do Render para o projeto Intranet
# ============================================================
# Documentação: https://render.com/docs/infrastructure-as-code
#
# Segredos (DATABASE_URL, OMIE_*) ficam no Dashboard da Render ou no .env local.
# Nunca commitar valores reais aqui — use sync: false.

envVarGroups:
  - name: intranet-cron-secrets
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OMIE_APP_KEY
        sync: false
      - key: OMIE_APP_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PGPOOL_MAX
        value: "5"

services:

  # ── Cron Job: Sincronização Automática via Agendamento ────────────────────
  # Roda a cada 5 minutos. O script sync_agendamento.js decide sozinho se é
  # hora de executar lendo "proxima_execucao" em public.agendamento_sincronizacao.
  # Isso permite qualquer horário configurado na página "Agendamento Automático".
  - type: cron
    name: sync-agendamento-omie
    runtime: node
    region: oregon
    schedule: "*/5 * * * *"
    buildCommand: npm ci --omit=dev
    startCommand: node cron/sync_agendamento.js
    envVarGroups:
      - name: intranet-cron-secrets
