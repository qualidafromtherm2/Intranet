# Documentação: https://render.com/docs/infrastructure-as-code

services:

  # ── Cron Job: Sincronização Automática via Agendamento ────────────────────
  # Roda a cada 5 minutos. O script sync_agendamento.js decide sozinho se é
  # hora de executar lendo "proxima_execucao" em public.agendamento_sincronizacao.
  # Isso permite qualquer horário configurado na página "Agendamento Automático".
  - type: cron
    name: sync-agendamento-omie
    runtime: node
    region: oregon           # mesma região do banco Postgres no Render
    schedule: "*/5 * * * *"  # A cada 5 min — o script decide se executa via proxima_execucao
    buildCommand: npm install --production
    startCommand: node cron/sync_agendamento.js
    envVars:
      - key: DATABASE_URL
        value: postgresql://intranet_db_yd0w_user:amLpOKjWzzDRhwcR1NF0eolJzzfCY0ho@dpg-d2d4b0a4d50c7385vm50-a.oregon-postgres.render.com:5432/intranet_db_yd0w?sslmode=require
      - key: OMIE_APP_KEY
        value: "4244634488206"
      - key: OMIE_APP_SECRET
        value: "10d9dde2e4e3bac7e62a2cc01bfba01e"
      - key: NODE_ENV
        value: production
