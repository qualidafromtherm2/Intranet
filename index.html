  <!-- Carrega o modal de permissões dinamicamente -->
  <script>
    $(document).ready(function(){
      $("#modalContainer").load("Permissoes/permissao.html", function() {
        $.getScript("Permissoes/permissao.js", function(){
          console.log("Script do modal de permissões carregado.");
          const btnConfigurarPermissoes = document.getElementById('btnConfigurarPermissoes');
          if (btnConfigurarPermissoes) {
            btnConfigurarPermissoes.addEventListener('click', function(e) {
              e.preventDefault();
              if (typeof abrirModalPermissoes === "function") {
                abrirModalPermissoes();
              } else {
                console.error("Função abrirModalPermissoes não encontrada.");
              }
            });
          } else {
            console.error("Botão btnConfigurarPermissoes não encontrado.");
          }
        });
      });
    });
  </script>
